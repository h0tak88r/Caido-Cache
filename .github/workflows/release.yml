name: 🚀 Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NODE_VERSION: 20
  PNPM_VERSION: 9

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: true

      - name: Typecheck, lint, knip
        run: |
          pnpm typecheck
          pnpm lint
          pnpm knip

      - name: Build package
        run: pnpm build

      - name: Sign package (optional)
        working-directory: dist
        run: |
          if [[ -z "${{ secrets.PRIVATE_KEY }}" ]]; then
            echo "No PRIVATE_KEY secret set — skipping signature."
          else
            echo "${{ secrets.PRIVATE_KEY }}" > private_key.pem
            openssl pkeyutl -sign -inkey private_key.pem -out plugin_package.zip.sig -rawin -in plugin_package.zip
            rm private_key.pem
          fi

      - name: Resolve release tag
        id: meta
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            TAG="${{ github.ref_name }}"
          else
            VERSION=$(unzip -p dist/plugin_package.zip manifest.json | jq -r .version)
            TAG="v${VERSION}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Releasing as ${TAG}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            dist/plugin_package.zip
            dist/plugin_package.zip.sig
